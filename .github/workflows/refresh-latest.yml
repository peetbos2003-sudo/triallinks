name: Refresh latest.json

on:
  schedule:
    # 05:17 UTC, Monday-Friday  (= 07:17 Amsterdam in summer / 06:17 in winter).
    # Off-peak minute so GitHub fires it closer to on-time. Edit "17 5" to change.
    - cron: '17 5 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape latest publications and rebuild latest.json
        env:
          STAFF_EMAIL: ${{ secrets.STAFF_EMAIL }}
        run: node scripts/refresh-latest.mjs

      - name: Commit and push (race-safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- latest.json; then
            echo "No change in latest.json."
            exit 0
          fi
          cp latest.json /tmp/latest.json
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/latest.json latest.json
            git add latest.json
            if git diff --staged --quiet; then
              echo "Remote already up to date."
              exit 0
            fi
            git commit -m "Auto-refresh latest.json"
            if git push origin HEAD:main; then
              echo "Pushed."
              exit 0
            fi
            echo "Push race detected; re-syncing and retrying ($i of 5)..."
            sleep 4
          done
          echo "Failed to push after 5 retries" >&2
          exit 1
